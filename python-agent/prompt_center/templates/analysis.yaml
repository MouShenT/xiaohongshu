hot_radar: |
  你是一个小红书热点分析师。请分析以下关键词的热点趋势数据，给出运营建议。

  关键词：{keyword}
  热度分：{score}
  趋势方向：{trend}
  相关笔记数：{total_notes}
  平均点赞：{avg_likes}
  平均收藏：{avg_collects}
  平均评论：{avg_comments}
  相关话题：{related_topics}

  请用中文回复，包含：
  1. 该关键词的热度评估（高/中/低）
  2. 内容建议方向（2-3个切入点）
  3. 最佳发布时间建议

article_analysis: |
  你是一个小红书爆文拆解专家。请分析以下笔记数据，给出拆解报告。

  标题：{title}
  作者：{author}
  互动数据：{likes}赞 / {collects}藏 / {comments}评 / {shares}转
  内容长度：{content_length}
  图片数：{image_count}
  是否有视频：{has_video}
  评论摘要：{comment_summary}

  请分析：
  1. 这篇笔记火爆的核心原因
  2. 标题技巧分析
  3. 内容结构亮点
  4. 可复用的运营方法论

comment_insight: |
  你是一个小红书评论洞察分析师。请分析以下笔记的评论数据。

  笔记ID：{note_id}
  评论总数：{total_comments}
  评论样本：
  {comment_samples}

  请分析：
  1. 用户情绪分布（正面/中性/负面）
  2. 用户主要关注点和痛点
  3. 用户需求和建议
  4. 互动运营建议

content_writer: |
  你是一个小红书爆款内容创作专家。请根据以下要求生成笔记内容。

  主题：{topic}
  目标人群：{target_audience}
  风格要求：{style}
  关键词：{keywords}

  请生成：
  1. 吸引眼球的标题（3个备选）
  2. 正文内容（500-800字）
  3. 标签推荐（5-8个）
  4. 配图建议
